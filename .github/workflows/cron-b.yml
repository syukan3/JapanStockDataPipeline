# Cron B - Earnings Calendar Sync
# JST 19:30 (UTC 10:30) - 翌営業日の決算発表予定取り込み
# 土日祝も起動（APIは「次の営業日」を返すため）

name: Cron B - Earnings Calendar Sync
run-name: ${{ inputs.dispatch_label && format('{0} · {1}', github.workflow, inputs.dispatch_label) || github.workflow }}

on:
  schedule:
    - cron: '30 10 * * *'  # JST 19:30（決算発表予定 19:00 公開に対する余裕確保）
  workflow_dispatch:        # 手動実行 / pg_cron からの外部トリガー
    inputs:
      dispatch_label:
        description: '外部トリガー識別ラベル（pg_cron発火時に付与・二重実行防止用）'
        required: false
        type: string
        default: ''

concurrency:
  group: cron-b
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Trigger Cron B - Earnings Calendar
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/cron/jquants/b" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"dataset": "earnings_calendar"}' \
            --fail --silent --show-error --max-time 30

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/notify/failure" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"job": "cron_b", "workflow_run_id": "${{ github.run_id }}"}' \
            --silent --show-error --max-time 30 || true

      # Portfolio(cachedRef/unstable_cache, TTL=1h)の参照データキャッシュを即時失効させる。
      # ベストエフォート: 失敗してもCron B本体は成功扱いのまま（TTL失効が保険として残る）。
      - name: Notify Portfolio - revalidate reference cache
        if: success()
        run: |
          curl -X POST "${{ secrets.PORTFOLIO_URL }}/api/internal/revalidate-reference" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_REVALIDATE_SECRET }}" \
            --silent --show-error --max-time 30 || true
