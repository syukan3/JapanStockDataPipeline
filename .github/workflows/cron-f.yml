name: Cron F - Weekly Margin Interest Sync
run-name: ${{ inputs.dispatch_label && format('{0} · {1}', github.workflow, inputs.dispatch_label) || github.workflow }}
on:
  # GitHub schedule はフォールバック（主経路は pg_cron 外部トリガー dispatch-cron-f）
  schedule:
    - cron: '30 20 * * 2'  # JST 水曜 05:30（週次、前週末の残高公表後）
  workflow_dispatch:
    inputs:
      dispatch_label:
        description: '外部トリガー識別ラベル（pg_cron発火時に付与・二重実行防止用）'
        required: false
        type: string
        default: ''

concurrency:
  group: cron-f
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Sync Weekly Margin Interest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: npx tsx scripts/cron/cron-f-direct.ts

      # Portfolio(cachedRef/unstable_cache, TTL=1h)の参照データキャッシュを即時失効させる。
      # ベストエフォート: 失敗してもCron F本体は成功扱いのまま（TTL失効が保険として残る）。
      - name: Notify Portfolio - revalidate reference cache
        if: success()
        run: |
          curl -X POST "${{ secrets.PORTFOLIO_URL }}/api/internal/revalidate-reference" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_REVALIDATE_SECRET }}" \
            --silent --show-error --max-time 30 || true
