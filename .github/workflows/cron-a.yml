# Cron A - Daily Data Sync
# JST 18:40 (UTC 09:40) - 当日の確定データ取り込み（市場終了後）
# 対象: カレンダー、株価、TOPIX、財務、銘柄マスタ

name: Cron A - Daily Data Sync
run-name: ${{ inputs.dispatch_label && format('{0} · {1}', github.workflow, inputs.dispatch_label) || github.workflow }}

on:
  schedule:
    - cron: '40 9 * * *'  # JST 18:40
  workflow_dispatch:       # 手動実行 / pg_cron からの外部トリガー
    inputs:
      dispatch_label:
        description: '外部トリガー識別ラベル（pg_cron発火時に付与・二重実行防止用）'
        required: false
        type: string
        default: ''

concurrency:
  group: cron-a
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Trigger Cron A - Calendar
        id: calendar
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/cron/jquants/a" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"dataset": "calendar"}' \
            --fail --silent --show-error --max-time 120

      - name: Sync Equity Bars (direct)
        id: equity_bars
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts equity_bars

      - name: Sync TOPIX (direct)
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts topix

      - name: Sync Financial (direct)
        id: financial
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts financial

      - name: Sync Equity Master (direct)
        id: equity_master
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts equity_master

      # 株式分割・併合の adj_* 再基準化（jquants_core.rebase_adjusted_bars）。
      # J-Quants の調整後株価は遡及型のため、権利落ち日を検知した銘柄の全履歴 adj_* を
      # raw × 累積調整係数でローカル再計算する。分割の無い日は検知0件で即終了（冪等）。
      # analytics 再計算より前に必ず実行し、再基準化済みデータで指標を計算させる。
      - name: Rebase adjusted bars (splits/reverse splits)
        id: rebase
        if: always() && steps.equity_bars.outcome == 'success'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/rebase-adjusted-bars.ts

      # 生データ(株価/財務/マスタ)確定後に派生メトリクスを再計算
      # refresh_stock_metrics は equity_bar_daily / equity_master / financial_disclosure を参照するため、
      # 3つ全ての同期が成功した時のみ実行する（部分株価や stale な財務での再計算・公開を防ぐ）。
      # rebase 失敗時もスキップ（分割日に未調整の adj で指標を再計算・公開しない）。
      - name: Refresh factor metrics (analytics.stock_metrics)
        id: refresh_stock_metrics
        if: always() && steps.equity_bars.outcome == 'success' && steps.equity_master.outcome == 'success' && steps.financial.outcome == 'success' && steps.rebase.outcome == 'success'
        run: |
          curl -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/rpc/refresh_stock_metrics" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Profile: analytics" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --silent --show-error --max-time 300

      # テクニカル指標スナップショットを再計算（analytics.technical_metrics）。
      # 非クリティカル: 失敗しても生データ同期(cron_a 本体)は成功扱いのまま（誤アラート防止）。
      # 株価(equity_bars)とマスタ(equity_master)の両方が成功した時のみ実行（古い/部分株価での公開を防ぐ）。
      # rebase 失敗時もスキップ（分割日に未調整の adj でスナップショットを公開しない）。
      - name: Refresh technical metrics (analytics.technical_metrics)
        id: refresh_technical
        if: always() && steps.equity_bars.outcome == 'success' && steps.equity_master.outcome == 'success' && steps.rebase.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/refresh-technical.ts

      # 類似銘柄検索用ファクターベクトル（analytics.stock_factor_vectors）を再計算。
      # 非クリティカル: 失敗しても生データ同期(cron_a 本体)は成功扱いのまま。
      # analytics.stock_screen（technical_metrics 反映後の結合ビュー）を読むため refresh_technical の後段に置く。
      - name: Refresh factor vectors (analytics.stock_factor_vectors)
        if: always() && steps.refresh_technical.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/refresh-factor-vectors.ts

      # 業種自動導出バスケット（銀行業/1615 等）の構成銘柄を equity_master から日次差分更新。
      # 非クリティカル: 失敗しても生データ同期(cron_a 本体)は成功扱いのまま。
      # 当日集計(refresh-basket-metrics)の *前* に構成銘柄を確定するため、このステップを先に置く
      # （GitHub Actions はステップを記述順に逐次実行するため順序が保証される）。
      # マイグレーション 00106 未適用（constituent_source 列が無い）の間は「未適用スキップ」で正常終了する。
      - name: Refresh sector basket constituents (analytics.basket_constituents)
        if: always() && steps.equity_master.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/refresh-sector-basket-constituents.ts

      # テーマバスケット割安判定（analytics.basket_metrics）の日次集計。
      # 非クリティカル: 失敗しても生データ同期(cron_a 本体)は成功扱いのまま。
      # 構成銘柄の当日バリュエーションは equity_bar_daily + financial_disclosure のPIT計算
      # （バックフィルと同一パス）。refresh_stock_metrics 成功をゲート条件にするのは、
      # その前提となる equity_bars/financial/rebase の成功を推移的に保証するため
      # （basket_definitions が未投入の間は0件検出で正常終了する）。
      - name: Refresh basket metrics (analytics.basket_metrics)
        if: always() && steps.refresh_stock_metrics.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/refresh-basket-metrics.ts

      # 市場全体指標（analytics.market_indicators）を forward-fill 更新。
      # 非クリティカル: 失敗しても生データ同期(cron_a 本体)は成功扱いのまま。
      # breadth（騰落数/新高値新安値/売買代金）は当日株価とマスタに依存するため
      # technical と同じゲート条件で実行する。
      - name: Refresh market indicators - breadth
        if: always() && steps.equity_bars.outcome == 'success' && steps.equity_master.outcome == 'success' && steps.rebase.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/refresh-market-indicators.ts --only-breadth

      # external(Yahoo/nikkei225jp)/weekly/derived は株価同期と独立に実行できる
      # （日経終値・PER等は外部ソース由来。同期失敗日でも取り込みを止めない）。
      - name: Refresh market indicators - external
        if: always() && steps.calendar.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 空売り比率はJ-Quants公式データ(short_selling_sector)から算出（2026-07切替）
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SHORT_RATIO_SOURCE: jquants
          # nikkei225jp.com は 2026-07-17 以降このランナー（米国リージョン）からの
          # 直接取得が 403 になったため、東京リージョン固定の自前ルート経由で取得する。
          NIKKEI225JP_PROXY_BASE_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npx tsx scripts/cron/refresh-market-indicators.ts --skip-breadth

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/notify/failure" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"job": "cron_a", "workflow_run_id": "${{ github.run_id }}"}' \
            --silent --show-error --max-time 30 || true

      # Portfolio(cachedRef/unstable_cache, TTL=1h)の参照データキャッシュを即時失効させる。
      # 致命的ステップ(継続不可なもの)が失敗した回はスキップ(success()。continue-on-error
      # ステップの失敗はジョブを失敗扱いにしないため素通りする)。ベストエフォート:
      # 失敗してもCron A本体は成功扱いのまま（TTL失効が保険として残る）。
      - name: Notify Portfolio - revalidate reference cache
        if: success()
        run: |
          curl -X POST "${{ secrets.PORTFOLIO_URL }}/api/internal/revalidate-reference" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_REVALIDATE_SECRET }}" \
            --silent --show-error --max-time 30 || true
