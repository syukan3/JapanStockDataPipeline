# Cron A - Daily Data Sync
# JST 18:40 (UTC 09:40) - 当日の確定データ取り込み（市場終了後）
# 対象: カレンダー、株価、TOPIX、財務、銘柄マスタ

name: Cron A - Daily Data Sync

on:
  schedule:
    - cron: '40 9 * * *'  # JST 18:40
  workflow_dispatch:       # 手動実行

concurrency:
  group: cron-a
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Trigger Cron A - Calendar
        id: calendar
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/cron/jquants/a" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"dataset": "calendar"}' \
            --fail --silent --show-error --max-time 120

      - name: Sync Equity Bars (direct)
        id: equity_bars
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts equity_bars

      - name: Sync TOPIX (direct)
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts topix

      - name: Sync Financial (direct)
        id: financial
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts financial

      - name: Sync Equity Master (direct)
        id: equity_master
        if: always() && steps.calendar.outcome == 'success'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/cron-a-direct.ts equity_master

      # 生データ(株価/財務/マスタ)確定後に派生メトリクスを再計算
      # refresh_stock_metrics は equity_bar_daily / equity_master / financial_disclosure を参照するため、
      # 3つ全ての同期が成功した時のみ実行する（部分株価や stale な財務での再計算・公開を防ぐ）。
      - name: Refresh factor metrics (analytics.stock_metrics)
        if: always() && steps.equity_bars.outcome == 'success' && steps.equity_master.outcome == 'success' && steps.financial.outcome == 'success'
        run: |
          curl -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/rpc/refresh_stock_metrics" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Profile: analytics" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --silent --show-error --max-time 300

      # テクニカル指標スナップショットを再計算（analytics.technical_metrics）。
      # 非クリティカル: 失敗しても生データ同期(cron_a 本体)は成功扱いのまま（誤アラート防止）。
      # 株価(equity_bars)とマスタ(equity_master)の両方が成功した時のみ実行（古い/部分株価での公開を防ぐ）。
      - name: Refresh technical metrics (analytics.technical_metrics)
        if: always() && steps.equity_bars.outcome == 'success' && steps.equity_master.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron/refresh-technical.ts

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/notify/failure" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"job": "cron_a", "workflow_run_id": "${{ github.run_id }}"}' \
            --silent --show-error --max-time 30 || true
